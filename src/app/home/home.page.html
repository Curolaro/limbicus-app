<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Home</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToRating()">
        <ion-icon name="star"></ion-icon>
      </ion-button>
      <ion-button (click)="goToSuggestions()">
        <ion-icon name="chatbubble"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <!-- Seção de Avaliações -->
  <ion-list>
    <ion-list-header>
      <ion-label>Avaliações</ion-label>
    </ion-list-header>
    
    <ion-item *ngIf="ratings.length === 0">
      <ion-label>Nenhuma avaliação ainda.</ion-label>
    </ion-item>

    <ion-item-sliding *ngFor="let item of ratings">
      <ion-item lines="full">
        <ion-label>
          <h2>Nota: {{ item.nota }}</h2>
          <p>{{ item.content }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="deleteRating(item.id!)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <!-- Seção de Sugestões -->
  <ion-list>
    <ion-list-header>
      <ion-label>Sugestões</ion-label>
    </ion-list-header>
    
    <ion-item *ngIf="suggestions.length === 0">
      <ion-label>Nenhuma sugestão ainda.</ion-label>
    </ion-item>

    <ion-item-sliding *ngFor="let item of suggestions">
      <ion-item lines="full" (click)="goToProfile(item.id_usuario)">
        <ion-label>
          <h2>{{ item.titulo }}</h2>
          <p>{{ item.descricao }}</p>
          <p>Status: {{ item.status }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="deleteSuggestion(item.id!)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

</ion-content>
